apiVersion: apps/v1
kind: Deployment
metadata:
  name: ui-deployment
  labels:
    app: ui
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ui
  template:
    metadata:
      labels:
        app: ui
    spec:
      containers:
      - name: ui
        image: guylivne1/life-project-images:ui
        ports:
        - containerPort: 3000
      imagePullSecrets:
      - name: life-image-registry-secret 