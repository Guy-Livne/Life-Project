apiVersion: apps/v1
kind: Deployment
metadata:
  name: ui-deployment
  labels:
    app: ui
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ui
  template:
    metadata:
      labels:
        app: ui
    spec:
      containers:
      - name: ui
        image: registry.gitlab.com/guy-livne/ui-service:v1.0.0
        ports:
        - containerPort: 3000
      imagePullSecrets:
      - name: gitlab-registry-secret